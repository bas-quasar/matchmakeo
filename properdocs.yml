site_name: matchmakeo
repo_url: https://github.com/bas-quasar/matchmakeo
repo_name: bas-quasar/matchmakeo
edit_uri: edit/dev/docs/
theme:
  name: materialx
  custom_dir: ./docs/overrides
  favicon: images/logo_tiny.png
  logo_light_mode: images/logo_tiny.png
  logo_dark_mode: images/logo_tiny_dark.png
  icon:
    repo: fontawesome/brands/github
  palette:
  - media: "(prefers-color-scheme)"
    toggle:
      icon: material/brightness-auto
      name: Switch to dark mode
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: cyan
    accent: cyan
    toggle:
      icon: material/brightness-4
      name: Switch to light mode 
  - media: "(prefers-color-scheme: light)"
    scheme: default
    toggle:
      icon: material/brightness-7
      name: Switch to system preference
  features:
    - navigation.path
    # - navigation.sections

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Installation: installation.md
  - Getting started: getting-started.md
  - Databases: databases.md
  - Metadata catalogues: metadata-catalogues.md
  - Downloading footprints: downloading-footprints.md
  - Querying: querying.md
  - Visualisation: visualisation.md
  - Developers:
    - Contributing: contributing.md
    - License: license.md
  - Roadmap: roadmap.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - include-markdown
  - mkdocs-autoapi:
      autoapi_dir: src
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src

copyright: Copyright &copy; 2026 British Antarctic Survey